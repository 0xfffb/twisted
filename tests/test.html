<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twisted VM Browser Test</title>
  </head>
  <body>
    <button id="run-vm">Run VM</button>
    <pre id="output"></pre>

    <script src="../dist/browser/runtime.js"></script>
    <script>
      const output = document.getElementById("output");

      document.getElementById("run-vm").addEventListener("click", async () => {
        const start = performance.now();
        try {
          const result = await TwistedRuntime.run([window, console]);
          const latencyMs = performance.now() - start;
          output.textContent = `Runtime executed. return value: ${String(result)}\nlatency: ${latencyMs.toFixed(2)} ms`;
        } catch (error) {
          const latencyMs = performance.now() - start;
          output.textContent = `Runtime failed: ${String(error)}\nlatency: ${latencyMs.toFixed(2)} ms`;
        }
      });
    </script>
  </body>
</html>
