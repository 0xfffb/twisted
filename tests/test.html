<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twisted VM Browser Test</title>
  </head>
  <body>
    <button id="run-fetch">Run Fetch</button>
    <pre id="output"></pre>

    <script src="../dist/browser/runtime.js"></script>
    <script>
      const output = document.getElementById("output");

      document.getElementById("run-fetch").addEventListener("click", async () => {
        const start = performance.now();
        try {
          const result = await fetch("http://127.0.0.1:5500/");
          const latencyMs = performance.now() - start;
          output.textContent = `Fetch executed. return value: ${String(await result.statusText)}\nlatency: ${latencyMs.toFixed(2)} ms`;
        } catch (error) {
          const latencyMs = performance.now() - start;
          output.textContent = `Fetch failed: ${String(error)}\nlatency: ${latencyMs.toFixed(2)} ms`;
        }
      });
    </script>
  </body>
</html>
